{{/* AdSense in-article */}}
{{ if .Site.Params.adsenseClient }}
<div class="my-8 text-center" aria-label="Reklama">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="{{ .Site.Params.adsenseClient }}"
    data-ad-slot="{{ .Site.Params.adsenseSlotArticle }}"
    data-ad-format="auto"
    data-full-width-responsive="true"></ins>
</div>
{{ else }}
<div class="my-8 bg-gray-100 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center h-24 text-gray-400 text-sm">
  [Miejsce na reklamę Google AdSense 728×90]
</div>
{{ end }}
