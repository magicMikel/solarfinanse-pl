<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Strona główna",
      "item": {{ .Site.BaseURL | jsonify }}
    }
    {{ if .IsSection }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ .Title | jsonify }},
      "item": {{ .Permalink | jsonify }}
    }
    {{ end }}
    {{ if .IsPage }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ .CurrentSection.Title | jsonify }},
      "item": {{ .CurrentSection.Permalink | jsonify }}
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | jsonify }},
      "item": {{ .Permalink | jsonify }}
    }
    {{ end }}
  ]
}
</script>
