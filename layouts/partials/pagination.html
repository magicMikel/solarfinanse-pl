{{ with .Paginator }}
{{ if gt .TotalPages 1 }}
<nav class="flex justify-center items-center gap-2 mt-10" aria-label="Paginacja">
  {{ if .HasPrev }}
  <a href="{{ .Prev.URL }}" class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:border-brand hover:text-brand transition-colors">
    ← Poprzednia
  </a>
  {{ end }}

  {{ range .Pagers }}
  <a href="{{ .URL }}"
     class="px-3 py-2 rounded-lg text-sm font-medium transition-colors
     {{ if eq . $.Paginator }}bg-brand text-white{{ else }}bg-white border border-gray-200 text-gray-700 hover:border-brand hover:text-brand{{ end }}">
    {{ .PageNumber }}
  </a>
  {{ end }}

  {{ if .HasNext }}
  <a href="{{ .Next.URL }}" class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:border-brand hover:text-brand transition-colors">
    Następna →
  </a>
  {{ end }}
</nav>
{{ end }}
{{ end }}
